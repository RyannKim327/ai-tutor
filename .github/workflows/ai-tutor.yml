name: AI Tutor Workflow

on:
  schedule:
    - cron: '0 4 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    env:
      PAGE_ID: ${{ secrets.PAGE_ID }}
      FB_TOKEN: ${{ secrets.FB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run script
        run: npm start

      - name: Configure Git
        run: |
          git config user.name "${{ secrets.NAME }}"
          git config user.email "${{ secrets.EMAIL }}"

      - name: Commit changes (if any)
        run: |
          git add .
          git diff --cached --quiet || git commit -m "Automated update"

      - name: Push changes
        run: git push

